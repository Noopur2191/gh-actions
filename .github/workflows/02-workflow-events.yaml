# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: 02 - Workflow Events
on:
  push:
  pull_request: 
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show the trigger
        run: echo "I have been triggered by a ${{ github.event_name }} event"